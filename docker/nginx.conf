# UNILIV Admin — static SPA + /api reverse proxy.
# TLS is expected to be terminated upstream (host reverse proxy / certbot /
# Cloudflare). The app sets `Secure` cookies in production, so the browser must
# reach this site over HTTPS for session refresh to work. See DEPLOYMENT.md.

server {
    listen 80;
    listen [::]:80;
    server_name unilivues1.enaacreations.com;

    root /usr/share/nginx/html;
    index index.html;

    # ── Upgrade cleartext to HTTPS ───────────────────────────────────────────
    # TLS terminates upstream and the terminator forwards X-Forwarded-Proto.
    # We only redirect when the proto header *explicitly* says http, so the
    # internal http hop from the terminator to this container is left intact.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security / transport headers ─────────────────────────────────────────
    # `always` so they're emitted on error responses too. Note: nginx does NOT
    # inherit server-level add_header into a location that declares its own
    # add_header — so any location below that sets headers re-emits these.
    # SPA is Vite/React on same-origin /api; widen style-src/font-src for the
    # Google Fonts stylesheet (fonts.googleapis.com) + font files (fonts.gstatic.com).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.r2.dev; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reasonable upload size for KYC images / menu PDFs, etc.
    client_max_body_size 25m;

    # gzip text assets
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # ── API → api container ──────────────────────────────────────────────────
    # No trailing slash on proxy_pass so the /api prefix is preserved
    # (Express mounts its router at /api).
    location /api/ {
        # Re-emit security headers (this location sets none of its own, but be
        # explicit so a future add_header here won't silently drop them).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.r2.dev; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_pass http://api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }

    # ── Fingerprinted static assets — cache hard ─────────────────────────────
    location /assets/ {
        # Re-emit security headers — this location declares add_header below,
        # which would otherwise suppress the server-level ones.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.r2.dev; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback (client-side routing via wouter) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        # Re-emit security headers — this location declares add_header below,
        # which would otherwise suppress the server-level ones.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://*.r2.dev; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
