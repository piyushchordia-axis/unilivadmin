# UNILIV Admin — static SPA + /api reverse proxy.
# TLS is expected to be terminated upstream (host reverse proxy / certbot /
# Cloudflare). The app sets `Secure` cookies in production, so the browser must
# reach this site over HTTPS for session refresh to work. See DEPLOYMENT.md.

server {
    listen 80;
    listen [::]:80;
    server_name unilivues1.enaacreations.com;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload size for KYC images / menu PDFs, etc.
    client_max_body_size 25m;

    # gzip text assets
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # ── API → api container ──────────────────────────────────────────────────
    # No trailing slash on proxy_pass so the /api prefix is preserved
    # (Express mounts its router at /api).
    location /api/ {
        proxy_pass http://api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }

    # ── Fingerprinted static assets — cache hard ─────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback (client-side routing via wouter) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
