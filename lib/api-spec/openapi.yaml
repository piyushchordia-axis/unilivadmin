components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    SearchParam:
      name: search
      in: query
      schema:
        type: string
    PropertyIdParam:
      name: propertyId
      in: query
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    RunReminderRuleResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            sent: { type: integer }
          required: [sent]
      required: [success, data]

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required: [total, page, limit, totalPages]

    # ─── AUTH ─────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/UserDto"
      required: [success, accessToken, user]

    # ─── USER ─────────────────────────────────────────────
    UserDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
        propertyId:
          type: string
          nullable: true
        isActive:
          type: boolean
        lastLogin:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, email, role, isActive, createdAt]

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserDto"
      required: [success, data]

    UsersListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserDto"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required: [success, data, meta]

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        role:
          type: string
        propertyId:
          type: string
      required: [name, email, password, role]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        role:
          type: string
        propertyId:
          type: string
        isActive:
          type: boolean

    # ─── DASHBOARD ────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalProperties:
          type: integer
        totalResidents:
          type: integer
        totalBeds:
          type: integer
        occupiedBeds:
          type: integer
        occupancyRate:
          type: number
        openComplaints:
          type: integer
        criticalComplaints:
          type: integer
        totalEmployees:
          type: integer
        pendingLeaves:
          type: integer
        newLeadsThisMonth:
          type: integer
        convertedLeadsThisMonth:
          type: integer
        revenueThisMonth:
          type: number
        pendingPayments:
          type: number
        lowStockItems:
          type: integer
      required: [totalProperties, totalResidents, totalBeds, occupiedBeds, occupancyRate, openComplaints, criticalComplaints, totalEmployees, pendingLeaves, newLeadsThisMonth, convertedLeadsThisMonth, revenueThisMonth, pendingPayments, lowStockItems]

    DashboardStatsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/DashboardStats"
      required: [success, data]

    ChartDataPoint:
      type: object
      properties:
        label:
          type: string
        value:
          type: number
      required: [label, value]

    DashboardCharts:
      type: object
      properties:
        occupancyTrend:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        complaintsByCategory:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        revenueTrend:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        leadsByStage:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        attendanceThisMonth:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
      required: [occupancyTrend, complaintsByCategory, revenueTrend, leadsByStage, attendanceThisMonth]

    DashboardChartsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/DashboardCharts"
      required: [success, data]

    # ─── PROPERTY ─────────────────────────────────────────
    PortfolioType:
      type: string
      enum:
        - CO_LIVING
        - STUDENT_HOUSING
        - SERVICED_APARTMENTS
        - PG
        - COLLEGE_HOSTEL
        - COWORKING
        - MANAGED_OFFICE

    PortfolioAttributes:
      type: object
      properties:
        institutionAffiliation:
          type: string
        academicYear:
          type: string
        gender:
          type: string
          enum: [MALE, FEMALE, COED]
        mealPlanIncluded:
          type: boolean
        mealPlanDetails:
          type: string
        nightlyRate:
          type: number
        weeklyRate:
          type: number
        deskCapacity:
          type: integer
        privateOfficeCount:
          type: integer
        seatCapacity:
          type: integer
        leaseTermMonths:
          type: integer

    PortfolioBreakdownEntry:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/PortfolioType"
        properties:
          type: integer
        totalBeds:
          type: integer
        occupied:
          type: integer
        occupancy:
          type: number
          description: Occupancy percentage (0-100, one decimal)
      required: [type, properties, totalBeds, occupied, occupancy]

    PortfolioBreakdownResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioBreakdownEntry"
      required: [success, data]

    PropertyDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        totalBeds:
          type: integer
        status:
          type: string
        portfolioType:
          $ref: "#/components/schemas/PortfolioType"
        portfolioAttributes:
          $ref: "#/components/schemas/PortfolioAttributes"
        wardenId:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        amenities:
          type: array
          items:
            type: string
        occupiedBeds:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, address, city, state, pincode, totalBeds, status, portfolioType, portfolioAttributes, amenities, occupiedBeds, createdAt, updatedAt]

    PropertyResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PropertyDto"
      required: [success, data]

    PropertiesListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PropertyDto"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required: [success, data, meta]

